<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dolwin Receiving App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f4f6f9; overflow-x: hidden; }
        .wrapper { display: flex; height: 100vh; width: 100%; position: relative; }
        
        /* Sidebar Default (Laptop) */
        .sidebar { width: 260px; background: #0d47a1; color: white; padding: 20px; flex-shrink: 0; display: flex; flex-direction: column; z-index: 1040; transition: transform 0.3s ease-in-out; }
        .sidebar .brand { font-size: 1.2rem; font-weight: 700; color: #ffc107; text-align: center; margin-bottom: 20px; }
        .sidebar label { font-size: 0.85rem; font-weight: 600; color: #90caf9; margin-bottom: 5px; margin-top: 15px; }
        
        /* Main Content */
        .main-content { flex-grow: 1; padding: 20px; overflow-y: auto; width: 100%; }
        .dash-card { border-radius: 12px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .dash-val { font-size: 1.8rem; font-weight: 700; }
        
        /* Table */
        .table-container { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); width: 100%; }
        .table-input th { font-size: 0.75rem; text-align: center; background-color: #e9ecef; white-space: nowrap; }
        .table-input td { padding: 4px; vertical-align: middle; }
        .table-input input, .table-input select { border: 1px solid #dee2e6; width: 100%; padding: 6px; font-size: 0.75rem; border-radius: 4px; }
        .table-input input:focus, .table-input select:focus { outline: none; border-color: #ff9800; background-color: #fffde7; box-shadow: 0 0 5px rgba(255, 152, 0, 0.3); }
        
        /* Lebar Kolom HP & Efek 3D */
        .table-input th:nth-child(5), .table-input td:nth-child(5) { min-width: 140px; } 
        .table-input th:nth-child(6), .table-input td:nth-child(6) { min-width: 130px; } 
        .table-input th:nth-child(7), .table-input td:nth-child(7) { min-width: 120px; } 
        .table-input th, .table-input td { min-width: 70px; }
        .btn-3d { border-bottom: 4px solid rgba(0,0,0,0.3); transition: all 0.1s; }
        .btn-3d:active { border-bottom: 0px; transform: translateY(4px); margin-bottom: 4px; }

        .input-upper { text-transform: uppercase; }
        .table-responsive::-webkit-scrollbar { height: 10px; }
        .table-responsive::-webkit-scrollbar-thumb { background: #0d47a1; border-radius: 5px; }
        
        /* Draft Buttons */
        .draft-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.1); padding: 8px; font-size: 0.85rem; border-radius: 6px; margin-bottom: 8px; cursor: pointer; transition: 0.3s; }
        .draft-item:hover { background: #ff9800; }

        /* Scanner Modal */
        #reader { width: 100%; border: 2px solid #0d47a1; border-radius: 10px; overflow: hidden; }

        /* Mobile Adjustments */
        @media (max-width: 992px) {
            .sidebar { position: fixed; top: 0; left: 0; bottom: 0; transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .main-content, .table-container { padding: 15px; }
        }
        .sidebar-backdrop { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1030; }
        .sidebar-backdrop.active { display: block; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>

        <div class="sidebar shadow-lg" id="sidebar">
            <div class="brand d-flex justify-content-between align-items-center">
                <span><i class="fas fa-ship me-2"></i>DOLWIN WMS</span>
                <button class="btn btn-sm btn-outline-light d-lg-none" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
            </div>
            <hr class="border-secondary">
            <label>1. PILIH KLIEN / SHIPPER</label>
            <select class="form-select mb-2" id="shipperSelect" onchange="updateTitle()">
                <option value="SPF">PT. SPF (Scan Input)</option>
                <option value="MPI">PT. MPI (SI Data)</option>
                <option value="HIJAU">PT. HIJAU LESTARI (SI Data)</option>
            </select>
            <label>2. PILIH GUDANG MASUK</label>
            <select class="form-select mb-2" id="gudangSelect" onchange="updateTitle()">
                <option value="Gudang 1 - Way Lunik">Gudang 1 - Way Lunik</option>
                <option value="Gudang 2 - Ara">Gudang 2 - Ara</option>
                <option value="Gudang 3 - Kuala" selected>Gudang 3 - Kuala</option>
            </select>

            <label>3. DRAFT TRANSAKSI</label>
            <div id="draftListArea" class="flex-grow-1 overflow-auto mt-2 pe-1"></div>

            <div class="mt-auto pt-3 border-top border-secondary">
                <button class="btn btn-outline-light w-100 btn-sm btn-3d" onclick="window.location.href='index.html'"><i class="fas fa-sign-out-alt me-2"></i>Keluar Sistem</button>
            </div>
        </div>

        <div class="main-content bg-light">
            <div class="d-flex align-items-center mb-4">
                <button class="btn btn-primary d-lg-none me-3 shadow-sm btn-3d" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                <h4 class="fw-bold text-dark m-0" id="pageTitle" style="font-size: 1.2rem;">Receiving - PT. SPF | Gudang 3</h4>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-12 col-md-4"><div class="card dash-card bg-primary text-white p-3"><div class="small fw-bold opacity-75">TARGET (CRATE)</div><div class="dash-val" id="dashTarget">39.000</div></div></div>
                <div class="col-12 col-md-4"><div class="card dash-card bg-success text-white p-3"><div class="small fw-bold opacity-75">SUDAH MASUK</div><div class="dash-val" id="dashMasuk">3.050</div></div></div>
                <div class="col-12 col-md-4"><div class="card dash-card bg-danger text-white p-3"><div class="small fw-bold opacity-75">SISA PABRIK</div><div class="dash-val" id="dashSisa">35.950</div></div></div>
            </div>

            <div class="card dash-card p-3 mb-4">
                <div class="row g-3">
                    <div class="col-12 col-md-3">
                        <label class="small fw-bold">ID Tujuan</label>
                        <select class="form-select form-select-sm border-primary" id="shipmentId" onchange="simulateDashboard()">
                            <option value="">-- Pilih Tujuan --</option>
                            <option value="DAM-001">DAM-001 | Damietta 1</option>
                        </select>
                    </div>
                    <div class="col-6 col-md-3"><label class="small fw-bold">No Truk <span class="text-danger">*</span></label><input type="text" id="noTruck" class="form-control form-control-sm input-upper" placeholder="Misal: BE 9090 XX"></div>
                    <div class="col-6 col-md-2"><label class="small fw-bold">Driver</label><input type="text" id="driver" class="form-control form-control-sm input-upper" placeholder="Nama Supir"></div>
                    <div class="col-6 col-md-2"><label class="small fw-bold">Total CBM</label><input type="number" step="0.01" id="totalCBM" class="form-control form-control-sm" placeholder="0.00"></div>
                    <div class="col-6 col-md-2"><label class="small fw-bold">Total GW</label><input type="number" step="0.01" id="totalGW" class="form-control form-control-sm" placeholder="0.00"></div>
                </div>
            </div>

            <div class="table-container">
                <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center mb-3 gap-3">
                    <h6 class="fw-bold text-primary m-0">Detail Scan Cargo (MDF)</h6>
                    <div class="d-flex flex-wrap gap-2">
                        <button class="btn btn-info btn-sm fw-bold text-white shadow-sm flex-grow-1 btn-3d" onclick="startCameraScan()" data-bs-toggle="modal" data-bs-target="#cameraModal"><i class="fas fa-camera"></i> Scan Kamera</button>
                        <button class="btn btn-outline-secondary btn-sm fw-bold flex-grow-1 btn-3d" onclick="newTransaction()"><i class="fas fa-plus"></i> Transaksi Baru</button>
                        <button class="btn btn-warning btn-sm fw-bold shadow-sm flex-grow-1 btn-3d" onclick="saveDraft()"><i class="fas fa-save"></i> Simpan Draft</button>
                        <button class="btn btn-success btn-sm fw-bold shadow-sm flex-grow-1 btn-3d" onclick="finalizeTransaction()"><i class="fas fa-check-double"></i> Selesai</button>
                    </div>
                </div>
                
                <div class="table-responsive">
                    <table class="table table-bordered table-input" id="scanTable">
                        <thead>
                            <tr>
                                <th width="3%">NO</th><th width="9%">TGL/WAKTU</th><th width="7%">DSO</th><th width="7%">NO DIE</th>
                                <th width="11%">SCAN CRATE</th><th width="10%">SIZE</th><th width="9%">MARKING</th><th width="6%">THICK</th>
                                <th width="8%">AREA</th><th width="5%">R</th><th width="5%">C</th><th width="5%">T</th><th width="10%">AKSI</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
                <button class="btn btn-secondary btn-sm mt-3 w-100 w-lg-auto btn-3d" onclick="addRows(10)"><i class="fas fa-plus"></i> Tambah 10 Baris</button>
            </div>
        </div>
    </div>

    <div class="modal fade" id="cameraModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-info text-white">
                    <h5 class="modal-title fw-bold"><i class="fas fa-camera me-2"></i>Scanner Kamera</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" onclick="stopCameraScan()"></button>
                </div>
                <div class="modal-body text-center p-2 p-md-3">
                    <div id="reader"></div>
                </div>
                <div class="modal-footer justify-content-center">
                    <button type="button" class="btn btn-secondary fw-bold btn-3d" data-bs-dismiss="modal" onclick="stopCameraScan()">Tutup Kamera</button>
                </div>
            </div>
        </div>
    </div>

    <datalist id="dsoHistory"></datalist><datalist id="dieHistory"></datalist><datalist id="markingHistory"></datalist><datalist id="thickHistory"></datalist>
    <datalist id="bayList"><option value="BAY A"></option><option value="RW 1"></option></datalist>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        window.onload = function() { addRows(20); loadDraftMenu(); };

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('sidebarBackdrop').classList.toggle('active');
        }

        function updateTitle() {
            const shipper = document.getElementById('shipperSelect');
            const gudang = document.getElementById('gudangSelect').value;
            document.getElementById('pageTitle').innerText = shipper.options[shipper.selectedIndex].text + " | " + gudang.split(' - ')[0];
        }

        function simulateDashboard() { /* Logika dummy dashboard sementara */ }

        function processHistory(inputElement, listId, prefix) {
            let val = inputElement.value.trim().toUpperCase();
            if (!val) return;
            if (prefix && !val.startsWith(prefix)) { val = prefix + val; inputElement.value = val; } else { inputElement.value = val; }
            const dataList = document.getElementById(listId);
            if (!Array.from(dataList.options).some(opt => opt.value === val)) {
                const newOption = document.createElement('option'); newOption.value = val; dataList.appendChild(newOption);
            }
        }

        function addRows(count) {
            const tbody = document.getElementById('tableBody');
            const sizeOptions = `<option value="">-Pilih-</option><option value="1220 X 2440">1220 X 2440</option><option value="1220 X 2800">1220 X 2800</option>`;
            
            for(let i = 0; i < count; i++) {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="text-center fw-bold row-number"></td>
                    <td><input type="text" class="tgl-input" readonly style="background:#f8f9fa; font-size:0.7rem;"></td>
                    <td><input type="text" list="dsoHistory" class="input-upper dso-input" onblur="processHistory(this, 'dsoHistory', 'DSO')"></td>
                    <td><input type="text" list="dieHistory" class="input-upper die-input" onblur="processHistory(this, 'dieHistory', 'DIE')"></td>
                    
                    <td><input type="text" maxlength="8" class="barcode-input bg-warning bg-opacity-10 fw-bold text-center" onchange="validateManualBarcode(this)" placeholder="SCAN"></td>
                    
                    <td><select class="size-input">${sizeOptions}</select></td>
                    <td><input type="text" list="markingHistory" class="input-upper marking-input" onblur="processHistory(this, 'markingHistory', '')"></td>
                    <td><input type="text" list="thickHistory" class="input-upper thick-input" onblur="processHistory(this, 'thickHistory', '')"></td>
                    <td><input list="bayList" class="input-upper bay-input"></td>
                    <td><input type="number" min="1" max="100" class="row-input"></td>
                    <td><input type="number" min="1" max="100" class="col-input"></td>
                    <td><input type="number" min="1" max="10" class="tier-input"></td>
                    <td class="text-center"><button class="btn btn-danger btn-sm btn-3d" onclick="hapusBaris(this)"><i class="fas fa-trash"></i></button></td>
                `;
                tbody.appendChild(tr);
            }
            updateRowNumbers();
        }

        // ==========================================
        // SISTEM ANTI-DUPLIKAT
        // ==========================================
        function validateManualBarcode(input) {
            let val = input.value.trim().toUpperCase();
            if(val === "") return;

            const allInputs = document.querySelectorAll('.barcode-input');
            let matchCount = 0;
            
            for(let i = 0; i < allInputs.length; i++) {
                if(allInputs[i].value.toUpperCase() === val) {
                    matchCount++;
                }
            }

            if(matchCount > 1) {
                alert("GAGAL! Crate Nomor: " + val + " SUDAH ADA di daftar.");
                input.value = ""; 
                input.focus();
                return;
            }

            fillDate(input);
        }

        function fillDate(inputElement) {
            const row = inputElement.closest('tr');
            const dateInput = row.querySelector('.tgl-input');
            if(inputElement.value.length > 0 && dateInput.value === "") {
                const now = new Date();
                const timeString = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
                dateInput.value = now.toLocaleDateString('id-ID') + " " + timeString;
            }
        }

        function hapusBaris(btn) {
            btn.closest('tr').remove();
            updateRowNumbers();
        }

        function updateRowNumbers() {
            const rows = document.querySelectorAll('#tableBody tr');
            rows.forEach((row, index) => { row.querySelector('.row-number').innerText = index + 1; });
        }

        // ==========================================
        // SISTEM KAMERA
        // ==========================================
        let html5QrcodeScanner;
        function startCameraScan() {
            setTimeout(() => {
                if (!html5QrcodeScanner) {
                    html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 100}, videoConstraints: { facingMode: "environment" } }, false);
                    html5QrcodeScanner.render(onScanSuccess, () => {});
                }
            }, 300);
        }

        function stopCameraScan() {
            if (html5QrcodeScanner) { html5QrcodeScanner.clear(); html5QrcodeScanner = null; }
        }

        function onScanSuccess(decodedText, decodedResult) {
            let cleanText = decodedText.substring(0, 8).toUpperCase();
            const barcodeInputs = document.querySelectorAll('.barcode-input');
            
            for (let input of barcodeInputs) {
                if (input.value.toUpperCase() === cleanText) {
                    stopCameraScan();
                    bootstrap.Modal.getInstance(document.getElementById('cameraModal')).hide();
                    alert("GAGAL SCAN! Crate Nomor: " + cleanText + " SUDAH ADA di daftar.");
                    return; 
                }
            }

            let foundEmpty = false;
            for (let input of barcodeInputs) {
                if (input.value === "") {
                    input.value = cleanText;
                    fillDate(input); 
                    foundEmpty = true;
                    beepSound();
                    
                    stopCameraScan();
                    bootstrap.Modal.getInstance(document.getElementById('cameraModal')).hide();
                    break;
                }
            }

            if (!foundEmpty) {
                alert("Tabel Penuh! Tambah baris dulu.");
                stopCameraScan(); bootstrap.Modal.getInstance(document.getElementById('cameraModal')).hide();
            }
        }

        function beepSound() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const osc = context.createOscillator(); osc.connect(context.destination);
            osc.start(); setTimeout(() => osc.stop(), 150);
        }

        // ==========================================
        // SISTEM DRAFT UTUH (TIDAK DIPOTONG)
        // ==========================================
        function newTransaction() { 
            if(confirm("Yakin ingin menghapus data di layar dan membuat transaksi baru?")) {
                document.getElementById('shipmentId').value = ""; 
                document.getElementById('noTruck').value = "";
                document.getElementById('driver').value = ""; 
                document.getElementById('totalCBM').value = "";
                document.getElementById('totalGW').value = ""; 
                document.getElementById('tableBody').innerHTML = ""; 
                addRows(20); 
            }
        }

        function saveDraft() {
            const noTruck = document.getElementById('noTruck').value.trim().toUpperCase();
            if(!noTruck) return alert("Isi Nomor Truk sebelum menyimpan draft!");
            
            // Ambil Data Header
            const headerData = { 
                shipmentId: document.getElementById('shipmentId').value, 
                noTruck: noTruck, 
                driver: document.getElementById('driver').value, 
                totalCBM: document.getElementById('totalCBM').value, 
                totalGW: document.getElementById('totalGW').value 
            };
            
            // Ambil Data Tabel Detail
            const rowsData = [];
            document.querySelectorAll('#tableBody tr').forEach(tr => {
                const crate = tr.querySelector('.barcode-input').value;
                if(crate !== "") { 
                    rowsData.push({ 
                        tgl: tr.querySelector('.tgl-input').value, 
                        dso: tr.querySelector('.dso-input').value, 
                        die: tr.querySelector('.die-input').value, 
                        crate: crate, 
                        size: tr.querySelector('.size-input').value, 
                        marking: tr.querySelector('.marking-input').value, 
                        thick: tr.querySelector('.thick-input').value, 
                        bay: tr.querySelector('.bay-input').value, 
                        row: tr.querySelector('.row-input').value, 
                        col: tr.querySelector('.col-input').value, 
                        tier: tr.querySelector('.tier-input').value
                    });
                }
            });
            
            localStorage.setItem("WMS_DRAFT_" + noTruck, JSON.stringify({ header: headerData, details: rowsData }));
            alert("Berhasil! Draft Truk " + noTruck + " sudah disimpan di perangkat ini."); 
            loadDraftMenu(); 
        }

        function loadDraftMenu() {
            const draftArea = document.getElementById('draftListArea'); 
            draftArea.innerHTML = ""; 
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith("WMS_DRAFT_")) {
                    const noTruk = key.replace("WMS_DRAFT_", "");
                    const div = document.createElement('div'); 
                    div.className = "draft-item";
                    
                    const span = document.createElement('span'); 
                    span.innerHTML = `<i class="fas fa-file-signature text-warning me-2"></i>Truk ${noTruk}`;
                    span.onclick = () => { if(window.innerWidth <= 992) toggleSidebar(); openDraft(key); };
                    span.style.flexGrow = "1";
                    
                    const delBtn = document.createElement('i');
                    delBtn.className = "fas fa-trash text-danger";
                    delBtn.onclick = (e) => { e.stopPropagation(); deleteDraft(key); };
                    
                    div.appendChild(span); div.appendChild(delBtn);
                    draftArea.appendChild(div);
                }
            }
        }

        function deleteDraft(key) {
            if(confirm("Yakin ingin MENGHAPUS draft truk ini? Data tidak bisa dikembalikan.")) {
                localStorage.removeItem(key);
                loadDraftMenu();
            }
        }
        
        function openDraft(key) { 
            if(!confirm("Tampilkan draft ini ke layar kerja? (Pastikan draft sebelumnya sudah disimpan)")) return;
            
            const data = JSON.parse(localStorage.getItem(key));
            document.getElementById('shipmentId').value = data.header.shipmentId; 
            document.getElementById('noTruck').value = data.header.noTruck;
            document.getElementById('driver').value = data.header.driver; 
            document.getElementById('totalCBM').value = data.header.totalCBM; 
            document.getElementById('totalGW').value = data.header.totalGW;
            
            document.getElementById('tableBody').innerHTML = ""; 
            addRows(Math.max(20, data.details.length + 5));
            
            const trs = document.querySelectorAll('#tableBody tr');
            data.details.forEach((det, idx) => {
                trs[idx].querySelector('.tgl-input').value = det.tgl; 
                trs[idx].querySelector('.dso-input').value = det.dso;
                trs[idx].querySelector('.die-input').value = det.die; 
                trs[idx].querySelector('.barcode-input').value = det.crate;
                trs[idx].querySelector('.size-input').value = det.size; 
                trs[idx].querySelector('.marking-input').value = det.marking;
                trs[idx].querySelector('.thick-input').value = det.thick; 
                trs[idx].querySelector('.bay-input').value = det.bay;
                trs[idx].querySelector('.row-input').value = det.row; 
                trs[idx].querySelector('.col-input').value = det.col;
                trs[idx].querySelector('.tier-input').value = det.tier;
            });
        }
        
        function finalizeTransaction() { 
            const noTruck = document.getElementById('noTruck').value.trim().toUpperCase();
            if(!noTruck) return alert("Isi Nomor Truk sebelum Finalisasi!");
            if(confirm("Apakah Anda yakin menyelesaikan transaksi Truk " + noTruck + "?")) {
                localStorage.removeItem("WMS_DRAFT_" + noTruck);
                alert("Sukses! Data dikunci dan dikirim.");
                document.getElementById('tableBody').innerHTML = ""; 
                addRows(20);
                loadDraftMenu();
            }
        }
    </script>
</body>
</html>

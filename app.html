<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dolwin Receiving App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f4f6f9; overflow-x: hidden; }
        
        /* Layout Struktur */
        .wrapper { display: flex; height: 100vh; }
        
        /* Sidebar Styling */
        .sidebar { width: 260px; background: #0d47a1; color: white; padding: 20px; flex-shrink: 0; display: flex; flex-direction: column; }
        .sidebar .brand { font-size: 1.2rem; font-weight: 700; color: #ffc107; text-align: center; margin-bottom: 20px; }
        .sidebar label { font-size: 0.85rem; font-weight: 600; color: #90caf9; margin-bottom: 5px; margin-top: 15px; }
        
        /* Main Content */
        .main-content { flex-grow: 1; padding: 20px; overflow-y: auto; }
        
        /* Mini Dashboard Cards */
        .dash-card { border-radius: 12px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .dash-val { font-size: 1.8rem; font-weight: 700; }
        
        /* Table Input Styling */
        .table-container { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .table-input th { font-size: 0.75rem; text-align: center; background-color: #e9ecef; white-space: nowrap; }
        .table-input td { padding: 4px; vertical-align: middle; }
        .table-input input, .table-input select { border: 1px solid #dee2e6; width: 100%; padding: 6px; font-size: 0.8rem; border-radius: 4px; }
        .table-input input:focus, .table-input select:focus { outline: none; border-color: #ff9800; background-color: #fffde7; box-shadow: 0 0 5px rgba(255, 152, 0, 0.3); }
        
        /* Khusus Input Uppercase (Kapslok) */
        .input-upper { text-transform: uppercase; }
        
        /* Sembunyikan scrollbar di tabel tapi tetap bisa digeser */
        .table-responsive::-webkit-scrollbar { height: 8px; }
        .table-responsive::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="wrapper">
        
        <div class="sidebar shadow-lg">
            <div class="brand"><i class="fas fa-ship me-2"></i>DOLWIN WMS</div>
            <hr class="border-secondary">
            
            <label>1. PILIH KLIEN / SHIPPER</label>
            <select class="form-select mb-2" id="shipperSelect" onchange="updateTitle()">
                <option value="SPF">PT. SPF (Scan Input)</option>
                <option value="MPI">PT. MPI (SI Data)</option>
                <option value="HIJAU">PT. HIJAU LESTARI (SI Data)</option>
            </select>
            
            <label>2. PILIH GUDANG MASUK</label>
            <select class="form-select mb-4" id="gudangSelect" onchange="updateTitle()">
                <option value="Gudang 1 - Way Lunik">Gudang 1 - Way Lunik</option>
                <option value="Gudang 2 - Ara">Gudang 2 - Ara</option>
                <option value="Gudang 3 - Kuala" selected>Gudang 3 - Kuala</option>
                <option value="Gudang 4 - Gudang Kaca">Gudang 4 - Gudang Kaca</option>
                <option value="Gudang 5 - Gudang Kaca">Gudang 5 - Gudang Kaca</option>
            </select>
            
            <div class="mt-auto">
                <button class="btn btn-outline-light w-100 btn-sm" onclick="window.location.href='index.html'"><i class="fas fa-sign-out-alt me-2"></i>Keluar</button>
            </div>
        </div>

        <div class="main-content bg-light">
            <h4 class="fw-bold text-dark mb-4" id="pageTitle">Receiving - PT. SPF | Gudang 3 - Kuala</h4>

            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="card dash-card bg-primary text-white p-3">
                        <div class="small fw-bold opacity-75">TARGET SHIPMENT (CRATE)</div>
                        <div class="dash-val" id="dashTarget">39.000</div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card dash-card bg-success text-white p-3">
                        <div class="small fw-bold opacity-75">SUDAH MASUK (GUDANG INI)</div>
                        <div class="dash-val" id="dashMasuk">3.050</div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card dash-card bg-danger text-white p-3">
                        <div class="small fw-bold opacity-75">SISA BALANCE PABRIK</div>
                        <div class="dash-val" id="dashSisa">35.950</div>
                    </div>
                </div>
            </div>

            <div class="card dash-card p-3 mb-4">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="small fw-bold">ID Tujuan / Shipment</label>
                        <select class="form-select form-select-sm border-primary" id="shipmentId" onchange="simulateDashboard()">
                            <option value="">-- Pilih Tujuan --</option>
                            <option value="DAM-001">DAM-001 | Damietta 1</option>
                            <option value="DAM-002">DAM-002 | Damietta 2</option>
                            <option value="IRN-001">IRN-001 | Bandar Abbas</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="small fw-bold">No Truk</label>
                        <input type="text" class="form-control form-control-sm input-upper" placeholder="Misal: BE 9090 XX">
                    </div>
                    <div class="col-md-2">
                        <label class="small fw-bold">Driver</label>
                        <input type="text" class="form-control form-control-sm input-upper" placeholder="Nama Supir">
                    </div>
                    <div class="col-md-2">
                        <label class="small fw-bold">Total CBM (SJ)</label>
                        <input type="number" step="0.01" class="form-control form-control-sm" placeholder="0.00">
                    </div>
                    <div class="col-md-2">
                        <label class="small fw-bold">Total GW (SJ)</label>
                        <input type="number" step="0.01" class="form-control form-control-sm" placeholder="0.00">
                    </div>
                </div>
            </div>

            <div class="table-container">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h6 class="fw-bold text-primary m-0">Detail Scan Cargo (MDF)</h6>
                    <button class="btn btn-warning btn-sm fw-bold"><i class="fas fa-save me-1"></i> Simpan Transaksi</button>
                </div>
                
                <div class="table-responsive">
                    <table class="table table-bordered table-input" id="scanTable">
                        <thead>
                            <tr>
                                <th width="3%">NO</th>
                                <th width="10%">TGL / WAKTU</th>
                                <th width="8%">NO DIE</th>
                                <th width="12%">SCAN NO CRATE</th>
                                <th width="10%">SIZE (MDF)</th>
                                <th width="8%">MARKING</th>
                                <th width="7%">THICK</th>
                                <th width="10%">BAY/AREA</th>
                                <th width="6%">ROW</th>
                                <th width="6%">COL</th>
                                <th width="6%">TIER</th>
                                <th width="14%">KETERANGAN</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            </tbody>
                    </table>
                </div>
                <button class="btn btn-secondary btn-sm mt-2" onclick="addRows(10)"><i class="fas fa-plus"></i> Tambah 10 Baris</button>
            </div>

        </div>
    </div>

    <datalist id="bayList">
        <option value="BAY A"></option><option value="BAY B"></option><option value="BAY C"></option>
        <option value="BAY D"></option><option value="BAY E"></option><option value="BAY F"></option>
        <option value="RW 1"></option><option value="RW 2"></option><option value="RW 3"></option>
        <option value="RW 4"></option><option value="RW 5"></option><option value="RW 6"></option>
    </datalist>

    <script>
        // Update Judul Halaman berdasarkan Sidebar
        function updateTitle() {
            const shipper = document.getElementById('shipperSelect');
            const gudang = document.getElementById('gudangSelect').value;
            const shipperName = shipper.options[shipper.selectedIndex].text;
            document.getElementById('pageTitle').innerText = "Receiving - " + shipperName + " | " + gudang;
        }

        // Simulasi Perubahan Dashboard saat Tujuan dipilih
        function simulateDashboard() {
            const ship = document.getElementById('shipmentId').value;
            if(ship === "DAM-001") {
                document.getElementById('dashTarget').innerText = "39.000";
                document.getElementById('dashMasuk').innerText = "3.050";
                document.getElementById('dashSisa').innerText = "35.950";
            } else if(ship === "DAM-002") {
                document.getElementById('dashTarget').innerText = "20.000";
                document.getElementById('dashMasuk').innerText = "500";
                document.getElementById('dashSisa').innerText = "19.500";
            } else {
                document.getElementById('dashTarget').innerText = "0";
                document.getElementById('dashMasuk').innerText = "0";
                document.getElementById('dashSisa').innerText = "0";
            }
        }

        // Generate Baris Tabel
        function addRows(count) {
            const tbody = document.getElementById('tableBody');
            let currentRows = tbody.rows.length;
            
            // Pilihan Size dari Master Data Abang
            const sizeOptions = `
                <option value="">-Pilih-</option>
                <option value="1220 X 2440">1220 X 2440</option><option value="1220 X 2800">1220 X 2800</option>
                <option value="1220 X 3050">1220 X 3050</option><option value="1220 X 4100">1220 X 4100</option>
                <option value="1830 X 2440">1830 X 2440</option><option value="1830 X 3660">1830 X 3660</option>
                <option value="2100 X 2800">2100 X 2800</option><option value="2200 X 2800">2200 X 2800</option>
            `;

            for(let i = 1; i <= count; i++) {
                currentRows++;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="text-center fw-bold">${currentRows}</td>
                    <td><input type="text" class="tgl-input" readonly placeholder="Auto Date" style="background:#f8f9fa;"></td>
                    <td><input type="text" class="input-upper"></td>
                    
                    <td><input type="text" maxlength="8" class="barcode-input bg-warning bg-opacity-10 fw-bold text-center" 
                        oninput="this.value = this.value.substring(0, 8); fillDate(this)"></td>
                    
                    <td><select>${sizeOptions}</select></td>
                    <td><input type="text" class="input-upper"></td>
                    <td><input type="text" class="input-upper"></td>
                    <td><input list="bayList" class="input-upper" placeholder="BAY / RW"></td>
                    <td><input type="number" min="1" max="100" placeholder="1-100"></td>
                    <td><input type="number" min="1" max="100" placeholder="1-100"></td>
                    <td><input type="number" min="1" max="10" placeholder="1-10"></td>
                    <td><input type="text"></td>
                `;
                tbody.appendChild(tr);
            }
        }

        // Auto isi tanggal/waktu saat barcode di scan
        function fillDate(inputElement) {
            const row = inputElement.closest('tr');
            const dateInput = row.querySelector('.tgl-input');
            if(inputElement.value.length > 0 && dateInput.value === "") {
                const now = new Date();
                const timeString = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
                dateInput.value = now.toLocaleDateString('id-ID') + " " + timeString;
            }
        }

        // Inisialisasi 20 baris pertama saat halaman dimuat
        window.onload = function() {
            addRows(20);
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Portal Internal Dolwin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #0d47a1; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #fff; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 100%; max-width: 400px; }
        .login-card img { max-height: 60px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="login-card text-center">
        <img src="dolwin logo.png" alt="Dolwin Group">
        <h4 class="fw-bold mb-4">Portal Internal</h4>
        
        <form id="loginForm">
            <div class="mb-3 text-start">
                <label class="form-label small fw-bold">Username</label>
                <input type="text" id="username" class="form-control" placeholder="Masukkan username" required>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label small fw-bold">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Masukkan password" required>
            </div>
            <button type="button" onclick="cekLogin()" class="btn btn-warning fw-bold w-100 mb-3">Masuk Sistem</button>
            <a href="index.html" class="text-decoration-none small text-muted">Kembali ke Beranda</a>
        </form>
    </div>

    <script>
        function cekLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Ini password sementara untuk tes sistem (Nanti kita amankan)
            if (user === 'pengawas' && pass === '123456') {
                window.location.href = 'receiving.html';
            } else {
                alert('Username atau Password salah!');
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dolwin Group | Modern Logistics</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #0d47a1; --accent: #ff6f00; }
        body { font-family: 'Poppins', sans-serif; color: #333; }

        /* Navbar Modern */
        .navbar { background: rgba(13, 71, 161, 0.95); backdrop-filter: blur(10px); transition: 0.3s; }
        
        /* Hero Section */
        .hero { height: 80vh; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('banner1.jpg'); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; color: white; text-align: center; }
        .hero h1 { font-size: 3.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Modern Cards */
        .card-unit { border: none; border-radius: 20px; overflow: hidden; transition: 0.4s ease; background: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .card-unit:hover { transform: translateY(-15px); box-shadow: 0 20px 40px rgba(0,0,0,0.15); border-bottom: 5px solid var(--accent); }
        .card-img-top { height: 200px; object-fit: contain; padding: 20px; background: #f9f9f9; }
        
        /* Buttons */
        .btn-modern { border-radius: 50px; padding: 12px 30px; font-weight: 600; text-transform: uppercase; transition: 0.3s; }
        .btn-accent { background: var(--accent); color: white; }
        .btn-accent:hover { background: #e65100; color: white; transform: scale(1.05); }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">DOLWIN <span class="text-warning">GROUP</span></a>
        </div>
    </nav>

    <!-- Hero -->
    <header class="hero">
        <div class="container">
            <h1 class="mb-4">Solusi Logistik Terpadu</h1>
            <p class="lead mb-4">Profesional, Efisien, dan Terpercaya Sejak 2012.</p>
            <a href="#unit" class="btn btn-modern btn-accent">Jelajahi Layanan</a>
        </div>
    </header>

    <!-- Unit Bisnis -->
    <section id="unit" class="py-5" style="margin-top: -50px;">
        <div class="container">
            <div class="row g-4">
                <!-- DTL -->
                <div class="col-md-4">
                    <div class="card card-unit h-100 p-3">
                        <img src="dolwin_logo.png" class="card-img-top" alt="DTL">
                        <div class="card-body text-center">
                            <h5 class="fw-bold">PT. Dolwin Trans Logistik</h5>
                            <p class="text-muted small">Logistik, Freight Forwarding & Trucking</p>
                            <button class="btn btn-outline-primary btn-sm rounded-pill" data-bs-toggle="modal" data-bs-target="#modalDTL">Lihat Detail</button>
                        </div>
                    </div>
                </div>
                <!-- DTA -->
                <div class="col-md-4">
                    <div class="card card-unit h-100 p-3">
                        <img src="logo_dta.png" class="card-img-top" alt="DTA">
                        <div class="card-body text-center">
                            <h5 class="fw-bold">PT. Dolwin Tangguh Abadi</h5>
                            <p class="text-muted small">Stevedoring & Cargodoring Profesional</p>
                            <button class="btn btn-outline-primary btn-sm rounded-pill" data-bs-toggle="modal" data-bs-target="#modalDTA">Lihat Detail</button>
                        </div>
                    </div>
                </div>
                <!-- DTS -->
                <div class="col-md-4">
                    <div class="card card-unit h-100 p-3">
                        <img src="logo_dts.png" class="card-img-top" alt="DTS">
                        <div class="card-body text-center">
                            <h5 class="fw-bold">PT. Dolwin Trading Service</h5>
                            <p class="text-muted small">General Trading & Komoditas</p>
                            <button class="btn btn-outline-primary btn-sm rounded-pill" data-bs-toggle="modal" data-bs-target="#modalDTS">Lihat Detail</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
